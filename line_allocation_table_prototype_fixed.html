<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Allocation Table - Riptide v2 Prototype</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: transparent;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 100%;
            margin: 0;
            background: transparent;
            padding: 0;
        }


        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .filter-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }

        select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.875rem;
            background: white;
            color: #374151;
            min-width: 200px;
            cursor: pointer;
        }

        select:hover {
            border-color: #9ca3af;
        }

        select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        button {
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: white;
            color: #374151;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        button:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        button:active {
            transform: scale(0.98);
        }


        /* Table styles */
        .table-container {
            border: 1px solid #dee2e6;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            table-layout: fixed;
        }

        table colgroup col:nth-child(1) { width: 40px; }
        table colgroup col:nth-child(2) { width: 15%; }
        table colgroup col:nth-child(3) { width: 12%; }
        table colgroup col:nth-child(4) { width: 18%; }
        table colgroup col:nth-child(5) { width: 15%; }
        table colgroup col:nth-child(6) { width: 20%; }
        table colgroup col:nth-child(7) { width: auto; }

        thead {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: #2d7738;
            font-size: 0.8125rem;
            letter-spacing: 0;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        th:hover {
            background-color: #e8f3e8;
        }

        th.numeric {
            text-align: right;
        }

        th.sortable::after {
            content: '↕';
            margin-left: 6px;
            color: #6c757d;
            font-size: 0.75rem;
        }

        th.sort-asc::after {
            content: '↑';
            color: #2d7738;
        }

        th.sort-desc::after {
            content: '↓';
            color: #2d7738;
        }

        tbody tr {
            border-bottom: 1px solid #dee2e6;
        }

        tbody tr:first-child {
            background-color: #f0f7f0;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        tbody tr:first-child:hover {
            background-color: #e8f3e8;
        }

        td {
            padding: 10px 14px;
            color: #212529;
        }

        td.numeric {
            text-align: right;
        }

        .expand-icon {
            cursor: pointer;
            user-select: none;
            font-size: 1rem;
            color: #6b7280;
            transition: all 0.2s;
            display: inline-block;
            width: 20px;
        }

        .expand-icon.expanded {
            /* No rotation needed - we'll change the icon */
        }

        .parent-row {
            cursor: pointer;
        }

        tr:not(.parent-row) {
            cursor: default;
        }

        .child-row {
            background-color: #f9fafb;
            display: none;
        }

        .child-row.visible {
            display: table-row;
        }

        .child-row td {
            font-size: 0.8125rem;
            color: #6b7280;
        }

        .child-row td:nth-child(4) {
            padding-left: 2rem;
            text-align: left;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <label for="shiftFilter">Shift</label>
                <select id="shiftFilter" onchange="applyFilters()">
                    <option value="">All Shifts</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="lineTypeFilter">Line Type</label>
                <select id="lineTypeFilter" onchange="applyFilters()">
                    <option value="">All Lines</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="expandAll()">⊞ Expand All</button>
                <button onclick="collapseAll()">⊟ Collapse All</button>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <colgroup>
                    <col style="width: 40px;">
                    <col style="width: 15%;">
                    <col style="width: 12%;">
                    <col style="width: 18%;">
                    <col style="width: 15%;">
                    <col style="width: 20%;">
                    <col style="width: auto;">
                </colgroup>
                <thead>
                    <tr>
                        <th></th>
                        <th class="sortable" onclick="sortTable('shift')">Shift</th>
                        <th class="sortable" onclick="sortTable('lineType')">Line Type</th>
                        <th class="sortable" onclick="sortTable('totalLines')">Total Lines/Teams</th>
                        <th class="numeric sortable" onclick="sortTable('hcAllocated')">HC Allocated</th>
                        <th class="numeric sortable" onclick="sortTable('totalLineRuntime')">Total Line Runtime (hrs)</th>
                        <th class="numeric sortable" onclick="sortTable('totalBoxes')">Total Boxes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Real production data
        function generateSampleData() {
            const realData = [
                // AUTO
                { shift: 'thursday_night', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5187 },
                { shift: 'friday_day', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5186 },
                { shift: 'friday_night', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5187 },
                { shift: 'saturday_day', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5187 },
                { shift: 'saturday_night', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5187 },
                { shift: 'sunday_day', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5186 },
                { shift: 'sunday_night', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5188 },
                { shift: 'monday_day', lineType: 'AUTO', totalLines: 4, totalLineRuntime: 37.0, totalBoxes: 5187 },
                { shift: 'monday_night', lineType: 'AUTO', totalLines: 3, totalLineRuntime: 23.3, totalBoxes: 3483 },
                { shift: 'tuesday_day', lineType: 'AUTO', totalLines: 3, totalLineRuntime: 27.7, totalBoxes: 4151 },
                { shift: 'tuesday_night', lineType: 'AUTO', totalLines: 3, totalLineRuntime: 25.4, totalBoxes: 2213 },

                // LDL
                { shift: 'thursday_night', lineType: 'LDL', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 2219 },
                { shift: 'friday_day', lineType: 'LDL', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 2219 },
                { shift: 'friday_night', lineType: 'LDL', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 2219 },
                { shift: 'saturday_day', lineType: 'LDL', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 2217 },
                { shift: 'saturday_night', lineType: 'LDL', totalLines: 1, totalLineRuntime: 7.0, totalBoxes: 844 },
                { shift: 'sunday_day', lineType: 'LDL', totalLines: 2, totalLineRuntime: 16.1, totalBoxes: 1936 },
                { shift: 'monday_day', lineType: 'LDL', totalLines: 1, totalLineRuntime: 8.6, totalBoxes: 1031 },
                { shift: 'tuesday_day', lineType: 'LDL', totalLines: 1, totalLineRuntime: 9.3, totalBoxes: 1110 },

                // EP
                { shift: 'friday_day', lineType: 'EP', totalLines: 1, totalLineRuntime: 9.2, totalBoxes: 1202 },
                { shift: 'saturday_day', lineType: 'EP', totalLines: 1, totalLineRuntime: 8.3, totalBoxes: 1075 },
                { shift: 'sunday_day', lineType: 'EP', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 2404 },
                { shift: 'tuesday_day', lineType: 'EP', totalLines: 2, totalLineRuntime: 17.4, totalBoxes: 2258 },

                // Legacy (Kitting)
                { shift: 'thursday_night', lineType: 'Legacy', totalLines: 2, totalLineRuntime: 9.3, totalBoxes: 7372 },
                { shift: 'friday_day', lineType: 'Legacy', totalLines: 7, totalLineRuntime: 61.2, totalBoxes: 20206 },
                { shift: 'saturday_day', lineType: 'Legacy', totalLines: 5, totalLineRuntime: 42.6, totalBoxes: 14046 },
                { shift: 'saturday_night', lineType: 'Legacy', totalLines: 6, totalLineRuntime: 46.3, totalBoxes: 20018 },
                { shift: 'sunday_day', lineType: 'Legacy', totalLines: 6, totalLineRuntime: 47.8, totalBoxes: 15773 },
                { shift: 'sunday_night', lineType: 'Legacy', totalLines: 11, totalLineRuntime: 97.2, totalBoxes: 32088 },
                { shift: 'monday_day', lineType: 'Legacy', totalLines: 2, totalLineRuntime: 14.8, totalBoxes: 4896 },
                { shift: 'monday_night', lineType: 'Legacy', totalLines: 1, totalLineRuntime: 0.2, totalBoxes: 66 },

                // Flexi (Kitting)
                { shift: 'thursday_night', lineType: 'Flexi', totalLines: 1, totalLineRuntime: 6.5, totalBoxes: 2410 },
                { shift: 'friday_day', lineType: 'Flexi', totalLines: 2, totalLineRuntime: 18.5, totalBoxes: 8251 },
                { shift: 'friday_night', lineType: 'Flexi', totalLines: 1, totalLineRuntime: 5.0, totalBoxes: 1864 },
                { shift: 'saturday_night', lineType: 'Flexi', totalLines: 1, totalLineRuntime: 5.4, totalBoxes: 2003 },

                // Cart Pick (Kitting)
                { shift: 'friday_day', lineType: 'Cart Pick', totalLines: 1, totalLineRuntime: 1.1, totalBoxes: 32 },
                { shift: 'friday_night', lineType: 'Cart Pick', totalLines: 1, totalLineRuntime: 0.1, totalBoxes: 4 },
                { shift: 'sunday_day', lineType: 'Cart Pick', totalLines: 1, totalLineRuntime: 3.8, totalBoxes: 113 },
                { shift: 'monday_day', lineType: 'Cart Pick', totalLines: 1, totalLineRuntime: 3.2, totalBoxes: 95 },
                { shift: 'monday_night', lineType: 'Cart Pick', totalLines: 1, totalLineRuntime: 1.4, totalBoxes: 42 },
            ];

            // HC per line type
            const hcPerLineType = {
                'AUTO': 10.33,
                'LDL': 26,
                'Legacy': 6.8,
                'EP': 17,
                'Cart Pick': 1.25,
                'Flexi': 9.3,
                'Grocery Line': 27,
                'Core Line': 19,
                'Pio': 1.3
            };

            // Generate child rows for each parent
            const data = realData.map(row => {
                const lines = [];
                const runtime = row.totalLineRuntime / row.totalLines;
                const boxesPerLine = Math.ceil(row.totalBoxes / row.totalLines);
                const hcPerLine = hcPerLineType[row.lineType] || 0;
                const totalHc = hcPerLine * row.totalLines;

                for (let i = 1; i <= row.totalLines; i++) {
                    // For AUTO: Line 4 is top-off (no boxes)
                    const isAutoTopOff = (row.lineType === 'AUTO' && i === 4);
                    const lineBoxes = isAutoTopOff ? 0 : boxesPerLine;
                    const lineBph = lineBoxes > 0 ? Math.ceil(lineBoxes / runtime) : 0;

                    // Legacy uses "Team" instead of "Line"
                    const lineLabel = row.lineType === 'Legacy' ? `Team ${i}` : `${row.lineType} Line ${i}`;

                    lines.push({
                        lineId: lineLabel,
                        hc: hcPerLine,
                        runtime: parseFloat(runtime.toFixed(2)),
                        boxes: lineBoxes,
                        bph: lineBph
                    });
                }

                return {
                    ...row,
                    hcAllocated: Math.ceil(totalHc),
                    lines
                };
            });

            return data;
        }

        let allData = generateSampleData();
        let sortState = { column: null, direction: 'asc' };

        // Populate filters
        const shifts = [...new Set(allData.map(r => r.shift))].sort();
        const lineTypes = [...new Set(allData.map(r => r.lineType))].sort();

        const shiftSelect = document.getElementById('shiftFilter');
        shifts.forEach(shift => {
            const option = document.createElement('option');
            option.value = shift;
            option.textContent = shift.replace(/_/g, ' ').split(' ')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            shiftSelect.appendChild(option);
        });

        const lineTypeSelect = document.getElementById('lineTypeFilter');
        lineTypes.forEach(lineType => {
            const option = document.createElement('option');
            option.value = lineType;
            option.textContent = lineType;
            lineTypeSelect.appendChild(option);
        });

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const groupedByShift = {};
            data.forEach(row => {
                if (!groupedByShift[row.shift]) {
                    groupedByShift[row.shift] = [];
                }
                groupedByShift[row.shift].push(row);
            });

            Object.keys(groupedByShift).sort().forEach(shift => {
                const shiftRows = groupedByShift[shift];

                shiftRows.forEach((row, idx) => {
                    const parentId = `parent-${shift}-${row.lineType}`;
                    const hasMultipleLines = row.totalLines > 1;

                    // Parent row
                    const tr = document.createElement('tr');
                    tr.className = hasMultipleLines ? 'parent-row' : '';
                    tr.dataset.parentId = parentId;
                    if (hasMultipleLines) {
                        tr.onclick = () => toggleExpand(parentId);
                    }

                    const lineLabel = row.lineType === 'Legacy' ?
                        (row.totalLines === 1 ? 'Team' : 'Teams') :
                        (row.totalLines === 1 ? 'Line' : 'Lines');

                    tr.innerHTML = `
                        <td>${hasMultipleLines ? `<span class="expand-icon" id="icon-${parentId}">▶</span>` : ''}</td>
                        <td>${shift.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</td>
                        <td>${row.lineType}</td>
                        <td>${row.totalLines} ${lineLabel}</td>
                        <td class="numeric">${row.hcAllocated}</td>
                        <td class="numeric">${row.totalLineRuntime.toFixed(2)}</td>
                        <td class="numeric">${row.totalBoxes.toLocaleString()}</td>
                    `;
                    tbody.appendChild(tr);

                    // Child rows (only if multiple lines)
                    if (hasMultipleLines) {
                        row.lines.forEach(line => {
                            const childTr = document.createElement('tr');
                            childTr.className = 'child-row';
                            childTr.dataset.parentId = parentId;

                            const emptyCell = '<td></td>';

                            if (line.hcBreakdown) {
                                // Kitting line with bay breakdown
                                childTr.innerHTML =
                                    emptyCell +
                                    emptyCell +
                                    emptyCell +
                                    `<td style="padding-left: 2rem; text-align: left;">${line.lineId}<br><span style="font-size: 0.75rem; color: #9ca3af;">${line.hcBreakdown}</span></td>
                                    <td class="numeric">${line.hc.toFixed(2)}</td>
                                    <td class="numeric">${line.runtime.toFixed(2)}</td>
                                    <td class="numeric">${line.boxes.toLocaleString()}</td>`;
                            } else {
                                // Regular line - no BPH
                                const bphDisplay = line.bph > 0 ? '' : '<br><span style="font-size: 0.75rem; color: #9ca3af;">Top-off (no boxes)</span>';
                                childTr.innerHTML =
                                    emptyCell +
                                    emptyCell +
                                    emptyCell +
                                    `<td style="padding-left: 2rem; text-align: left;">${line.lineId}${bphDisplay}</td>
                                    <td class="numeric">${line.hc.toFixed(2)}</td>
                                    <td class="numeric">${line.runtime.toFixed(2)}</td>
                                    <td class="numeric">${line.boxes.toLocaleString()}</td>`;
                            }
                            tbody.appendChild(childTr);
                        });
                    }
                });
            });
        }

        function toggleExpand(parentId) {
            const icon = document.getElementById(`icon-${parentId}`);
            const childRows = document.querySelectorAll(`.child-row[data-parent-id="${parentId}"]`);

            const isExpanded = icon.classList.contains('expanded');

            if (isExpanded) {
                // Collapse
                icon.classList.remove('expanded');
                icon.textContent = '▶';
                childRows.forEach(row => row.classList.remove('visible'));
            } else {
                // Expand - point down
                icon.classList.add('expanded');
                icon.textContent = '▼';
                childRows.forEach(row => row.classList.add('visible'));
            }
        }

        function expandAll() {
            document.querySelectorAll('.expand-icon').forEach(icon => {
                const parentId = icon.id.replace('icon-', '');
                icon.classList.add('expanded');
                icon.textContent = '▼';
                document.querySelectorAll(`.child-row[data-parent-id="${parentId}"]`)
                    .forEach(row => row.classList.add('visible'));
            });
        }

        function collapseAll() {
            document.querySelectorAll('.expand-icon').forEach(icon => {
                const parentId = icon.id.replace('icon-', '');
                icon.classList.remove('expanded');
                icon.textContent = '▶';
                document.querySelectorAll(`.child-row[data-parent-id="${parentId}"]`)
                    .forEach(row => row.classList.remove('visible'));
            });
        }

        function applyFilters() {
            const shiftValue = document.getElementById('shiftFilter').value;
            const lineTypeValue = document.getElementById('lineTypeFilter').value;

            let filteredData = allData;

            if (shiftValue) {
                filteredData = filteredData.filter(r => r.shift === shiftValue);
            }

            if (lineTypeValue) {
                filteredData = filteredData.filter(r => r.lineType === lineTypeValue);
            }

            renderTable(filteredData);
        }

        function sortTable(column) {
            // Toggle sort direction
            if (sortState.column === column) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.column = column;
                sortState.direction = 'asc';
            }

            // Update header indicators
            document.querySelectorAll('th.sortable').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });

            const activeHeader = document.querySelector(`th[onclick="sortTable('${column}')"]`);
            if (activeHeader) {
                activeHeader.classList.add(sortState.direction === 'asc' ? 'sort-asc' : 'sort-desc');
            }

            // Sort data
            const shiftValue = document.getElementById('shiftFilter').value;
            const lineTypeValue = document.getElementById('lineTypeFilter').value;

            let filteredData = allData;
            if (shiftValue) {
                filteredData = filteredData.filter(r => r.shift === shiftValue);
            }
            if (lineTypeValue) {
                filteredData = filteredData.filter(r => r.lineType === lineTypeValue);
            }

            const sortedData = [...filteredData].sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }

                if (sortState.direction === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });

            renderTable(sortedData);
        }

        // Initial render
        renderTable(allData);
    </script>
</body>
</html>
